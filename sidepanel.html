<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SF3 Live Monitor</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Segoe UI", Arial, sans-serif;
        background: #0d1420;
        color: #e8efff;
      }

      body {
        margin: 0;
        padding: 16px;
        background:
          radial-gradient(circle at top right, rgba(59, 130, 246, 0.14), transparent 28%),
          radial-gradient(circle at top left, rgba(232, 152, 48, 0.12), transparent 22%),
          #0d1420;
      }

      .shell {
        display: grid;
        gap: 14px;
      }

      .panel {
        border: 1px solid rgba(154, 176, 212, 0.16);
        border-radius: 14px;
        background: rgba(14, 22, 35, 0.92);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.22);
        padding: 14px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }

      .title {
        font-size: 20px;
        font-weight: 700;
        margin: 0;
      }

      .subtitle {
        margin: 4px 0 0;
        color: #8ea3c5;
        font-size: 12px;
        line-height: 1.45;
      }

      .header-actions {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
      }

      button.primary {
        background: #2f6fed;
        color: #ffffff;
      }

      button.secondary {
        background: rgba(142, 163, 197, 0.18);
        color: #dce8ff;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
      }

      .badge.waiting {
        background: rgba(148, 163, 184, 0.18);
        color: #cdd8eb;
      }

      .badge.live {
        background: rgba(34, 197, 94, 0.18);
        color: #99f6b8;
      }

      .meta-row {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        margin-top: 10px;
        font-size: 12px;
        color: #8ea3c5;
      }

      .card-grid {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .metric-card {
        border-radius: 12px;
        padding: 12px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(154, 176, 212, 0.12);
      }

      .metric-card h2 {
        margin: 0;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #8ea3c5;
      }

      .metric-value {
        margin-top: 8px;
        font-size: 24px;
        font-weight: 800;
      }

      .metric-detail {
        margin-top: 6px;
        font-size: 12px;
        color: #b4c4df;
        line-height: 1.45;
      }

      .metric-sf3 .metric-value {
        color: #f4b366;
      }

      .metric-nof .metric-value {
        color: #ffd27d;
      }

      .metric-mf .metric-value {
        color: #fca5a5;
      }

      .rolling-grid {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .chart-stack {
        display: grid;
        gap: 14px;
      }

      .chart-panel {
        padding: 0;
        overflow: hidden;
      }

      .chart-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 14px 0;
      }

      .legend {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        font-size: 12px;
        color: #b4c4df;
      }

      .legend span {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .legend i {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 999px;
      }

      .chart-frame {
        padding: 10px 8px 12px;
      }

      .chart-svg {
        width: 100%;
        height: 190px;
        display: block;
      }

      .chart-empty {
        fill: #8ea3c5;
        font-size: 14px;
      }

      .section-title {
        font-size: 16px;
        font-weight: 700;
        margin: 0;
      }

      .alerts-list {
        list-style: none;
        padding: 0;
        margin: 12px 0 0;
        display: grid;
        gap: 8px;
      }

      .alerts-list li {
        border-radius: 10px;
        border: 1px solid rgba(154, 176, 212, 0.1);
        background: rgba(255, 255, 255, 0.03);
        padding: 10px 12px;
      }

      .alert-time {
        display: block;
        font-size: 11px;
        color: #8ea3c5;
        margin-bottom: 4px;
      }

      .alert-message {
        font-size: 12px;
        color: #e8efff;
        line-height: 1.45;
      }

      .hint {
        font-size: 12px;
        color: #8ea3c5;
        line-height: 1.55;
      }

      @media (max-width: 980px) {
        .card-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 720px) {
        body {
          padding: 12px;
        }

        .header {
          flex-direction: column;
        }

        .header-actions {
          width: 100%;
        }

        .header-actions button {
          flex: 1 1 0;
        }

        .card-grid,
        .rolling-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="panel">
        <div class="header">
          <div>
            <h1 class="title">SF3 Live Monitor</h1>
            <p class="subtitle">Tracks live SF3, NOFA, MomoFlow, and price from BigShort, with separate stacked charts and a Wicky-style pop-out view.</p>
          </div>
          <div class="header-actions">
            <button class="secondary" id="popoutButton" type="button">Pop Out</button>
            <button class="primary" id="armAudioButton" type="button">Arm Audio</button>
            <button class="secondary" id="clearSessionButton" type="button">Reset Session</button>
          </div>
        </div>
        <div class="meta-row">
          <span class="badge waiting" id="statusBadge">Waiting for BigShort data</span>
          <span id="lastUpdatedText">Last update: --</span>
        </div>
      </section>

      <section class="panel">
        <div class="card-grid" id="currentMetricsGrid"></div>
      </section>

      <section class="panel">
        <div class="rolling-grid" id="rollingMetricsGrid"></div>
      </section>

      <div class="chart-stack">
        <section class="panel chart-panel">
          <div class="chart-header">
            <div>
              <h2 class="section-title">NOF / NOFA</h2>
            </div>
          </div>
          <div class="chart-frame">
            <svg class="chart-svg" id="nofChart" viewBox="0 0 640 190" preserveAspectRatio="none"></svg>
          </div>
        </section>

        <section class="panel chart-panel">
          <div class="chart-header">
            <div>
              <h2 class="section-title">MomoFlow</h2>
            </div>
          </div>
          <div class="chart-frame">
            <svg class="chart-svg" id="momoFlowChart" viewBox="0 0 640 190" preserveAspectRatio="none"></svg>
          </div>
        </section>

        <section class="panel chart-panel">
          <div class="chart-header">
            <div>
              <h2 class="section-title">SF3</h2>
            </div>
          </div>
          <div class="chart-frame">
            <svg class="chart-svg" id="sf3Chart" viewBox="0 0 640 190" preserveAspectRatio="none"></svg>
          </div>
        </section>

        <section class="panel chart-panel">
          <div class="chart-header">
            <div>
              <h2 class="section-title">Price</h2>
            </div>
          </div>
          <div class="chart-frame">
            <svg class="chart-svg" id="priceChart" viewBox="0 0 640 190" preserveAspectRatio="none"></svg>
          </div>
        </section>
      </div>

      <section class="panel">
        <div class="title" style="font-size: 16px;">Alerts</div>
        <div class="subtitle">Audio fires when a monitored state crosses into a new alert band.</div>
        <ul class="alerts-list" id="alertsList"></ul>
      </section>
    </div>

    <script src="audio-alarm-notifier.js"></script>
    <script src="sidepanel.js"></script>
  </body>
</html>
